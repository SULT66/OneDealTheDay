<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Your OneDailyDrop Account</title><link rel="stylesheet" href="/club.css?v=20260723"><style>.account-main{min-height:78vh;display:grid;place-items:center}.account-card{width:min(520px,100%);padding:32px;border:1px solid var(--line);border-radius:24px;background:var(--surface)}.tabs{display:flex;gap:8px;margin:22px 0}.tabs button{flex:1;padding:12px;border:1px solid var(--line);border-radius:10px;background:transparent;color:var(--text);font-weight:800}.tabs button.active{background:var(--text);color:var(--bg)}label{display:block;margin:14px 0;font-size:12px;font-weight:850}input{width:100%;min-height:48px;margin-top:7px;padding:0 13px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--text)}form .primary{width:100%;margin-top:12px}.status{color:var(--muted);text-align:center}.plan-note{padding:14px;border-radius:12px;background:var(--soft);color:var(--muted)}</style></head><body><header><a class="brand" href="/"><span>D</span><b>OneDailyDrop</b></a><nav><a href="/club">Club $2.99</a></nav></header><main class="account-main"><section class="account-card"><p class="eyebrow">FREE ACCOUNT</p><h1 id="title">Create your account</h1><p class="plan-note" id="planNote" hidden>First create your free account. Then you can join OneDailyDrop Club for $2.99/month.</p><div class="tabs"><button id="registerTab" class="active">Create account</button><button id="loginTab">Sign in</button></div><form id="authForm"><label id="nameLabel">Name<input id="name" autocomplete="name"></label><label>Email<input id="email" type="email" required autocomplete="email"></label><label>Password<input id="password" type="password" required minlength="8" autocomplete="new-password"></label><button class="primary" type="submit">Create free account</button><p class="status" id="status">Free forever. Club is optional.</p></form></section></main><script src="/account.js?v=20260723"></script></body></html>
