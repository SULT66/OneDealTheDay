<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Your OneDailyDrop Account</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0B1020">
  <link rel="stylesheet" href="/club.css?v=20260723-account"><link rel="stylesheet" href="/account-nav.css?v=20260723"><link rel="stylesheet" href="/brand-theme.css?v=20260723">
  <style>
    .account-main{min-height:78vh;display:grid;place-items:center;padding:44px 24px}.account-card{width:min(540px,100%);padding:32px;border:1px solid var(--line);border-radius:24px;background:var(--surface);box-shadow:0 22px 70px rgba(20,22,26,.08)}.tabs{display:flex;gap:8px;margin:22px 0}.tabs button{flex:1;padding:12px;border:1px solid var(--line);border-radius:10px;background:transparent;color:var(--text);font-weight:800;cursor:pointer}.tabs button.active{background:var(--text);color:var(--bg)}label{display:block;margin:14px 0;font-size:12px;font-weight:850}input{width:100%;min-height:48px;margin-top:7px;padding:0 13px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--text)}input:focus{outline:2px solid color-mix(in srgb,var(--orange) 45%,transparent);border-color:var(--orange)}.terms-check{display:flex;align-items:flex-start;gap:10px;color:var(--muted);line-height:1.45}.terms-check input{width:18px;min-height:18px;margin:1px 0 0;flex:0 0 auto}.terms-check a{color:var(--orange)}form .primary{width:100%;margin-top:12px}.status{color:var(--muted);text-align:center;line-height:1.45}.status.is-error{color:#c73a30}.forgot{display:block;margin:-3px 0 13px;text-align:right;color:var(--orange);font-size:13px;font-weight:800}.back-button{padding:0;border:0;background:none;color:var(--orange);font-weight:800;cursor:pointer}.password-rules{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin:-4px 0 14px;padding:0;list-style:none;color:var(--muted);font-size:12px}.password-rules li::before{content:"○";margin-right:6px}.password-rules li.met{color:#168449}.password-rules li.met::before{content:"✓"}.profile-card{text-align:center}.profile-avatar{display:grid;place-items:center;width:74px;height:74px;margin:0 auto 18px;border-radius:50%;background:var(--orange);color:#fff;font-size:30px;font-weight:950}.profile-email{color:var(--muted)}.profile-plan{margin:22px 0;padding:18px;border-radius:16px;background:var(--soft);text-align:left}.profile-actions{display:grid;gap:10px}.profile-actions a,.profile-actions button{min-height:48px;border-radius:12px;font-weight:900}.profile-actions a{display:grid;place-items:center}.logout-button{border:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer}@media(max-width:520px){.password-rules{grid-template-columns:1fr}}
  </style>
  <link rel="stylesheet" href="/liquid-glass.css?v=20260723-polish1">
</head>
<body>
  <header><a class="brand" href="/"><span>D</span><b>OneDailyDrop</b></a><nav><span data-account-nav></span><button id="themeToggle" type="button" aria-label="Switch to dark mode" title="Dark mode">☾</button></nav></header>
  <main class="account-main">
    <section class="account-card" id="authCard">
      <h1 id="title">Create your free account</h1>
      <div class="tabs" id="tabs"><button id="registerTab" class="active" type="button">Create account</button><button id="loginTab" type="button">Sign In</button></div>
      <form id="authForm">
        <label id="nameLabel">Name<input id="name" autocomplete="name"></label>
        <label>Email<input id="email" type="email" required autocomplete="email"></label>
        <label>Password<input id="password" type="password" required minlength="12" autocomplete="new-password" aria-describedby="passwordRules"></label>
        <ul class="password-rules" id="passwordRules">
          <li data-rule="length">12+ characters</li><li data-rule="lower">Lowercase letter</li>
          <li data-rule="upper">Uppercase letter</li><li data-rule="number">Number</li>
          <li data-rule="symbol">Symbol</li>
        </ul>
        <label id="termsLabel" class="terms-check"><input id="termsAccepted" type="checkbox"> <span>I agree to the <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>.</span></label>
        <a class="forgot" id="forgotLink" href="#" hidden>Forgot password?</a>
        <button class="primary" type="submit">Create free account</button>
        <p class="status" id="status">Free forever. Club is optional.</p>
      </form>
    </section>
    <section class="account-card profile-card" id="profileCard" hidden>
      <div class="profile-avatar" id="profileAvatar"></div><p class="eyebrow">YOU ARE SIGNED IN</p><h1 id="profileName"></h1><p class="profile-email" id="profileEmail"></p>
      <div class="profile-plan"><b id="profilePlan"></b><p id="profilePlanText"></p></div>
      <div class="profile-actions"><a class="primary" id="profileSubscribe" href="/club">Subscribe — $2.99/month</a><button class="logout-button" id="profileLogout" type="button">Log Out</button></div>
    </section>
  </main>
  <script src="/theme.js?v=20260723"></script><script src="/auth-ui.js?v=20260723"></script><script src="/account.js?v=20260723-security"></script>
</body>
</html>
