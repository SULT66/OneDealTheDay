<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link rel="stylesheet" href="/styles.css"><link rel="stylesheet" href="/liquid-glass.css?v=20260723"><title>Admin</title></head><body><main><section><h2>Product refresh</h2><p>Enter ADMIN_KEY from .env and run discovery now.</p><input id="key" type="password" style="padding:12px;width:100%;max-width:500px"><button class="button" style="border:0;max-width:300px" onclick="go()">Find and publish Top 10</button><pre id="out">Loading status…</pre></section></main><script>async function status(){out.textContent=JSON.stringify(await(await fetch('/api/status')).json(),null,2)}async function go(){out.textContent='Searching…';const r=await fetch('/api/admin/refresh',{method:'POST',headers:{'X-Admin-Key':key.value}});out.textContent=JSON.stringify(await r.json(),null,2)}status()</script><script src="/theme.js?v=20260723"></script></body></html>
